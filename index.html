                scores[m.id] = (m.homeScore !== null && m.awayScore !== null) ? { home: m.homeScore, away: m.awayScore } : null;

    function getPoints(predStr, realHome, realAway) {
        if (!predStr || predStr === "—") return 0;
        const [predHome, predAway] = predStr.split(':').map(Number);

        if (predHome === realHome && predAway === realAway) return 3;
        const realDiff = realHome - realAway;
        const predDiff = predHome - predAway;
        if (realDiff === predDiff) return 2;
        const realOutcome = realHome > realAway ? 1 : (realHome === realAway ? 0 : -1);
        const predOutcome = predHome > predAway ? 1 : (predHome === predAway ? 0 : -1);
        if (realOutcome === predOutcome) return 1;
        return 0;

                const pts = getPoints(m.pred[i], real.home, real.away);
                if (pts === 3) { stats[i].points += 3; stats[i].exact++; }
                else if (pts === 2) { stats[i].points += 2; stats[i].diff++; }
                else if (pts === 1) { stats[i].points += 1; stats[i].outcome++; }
            }
        }
        stats.sort((a,b) => b.points - a.points || b.exact - a.exact || b.diff - a.diff);
        return stats;
    }

    function renderExpertsRank() {
        const stats = computeExpertsStats();
        let html = `<h3><i class="fas fa-trophy"></i> 🏆 Рейтинг экспертов (3 — точный счёт, 2 — разница, 1 — исход)</h3>
            <table class="rank-table"><thead><tr><th>Место</th><th>Эксперт</th><th>Очки</th><th>Точных<br>счетов</th><th>Разниц<br>(2 очка)</th><th>Исходов<br>(1 очко)</th></tr></thead><tbody>`;
        stats.forEach((exp, idx) => {
            let medalClass = "";
            if (idx === 0) medalClass = "rank-1";
            else if (idx === 1) medalClass = "rank-2";
            else if (idx === 2) medalClass = "rank-3";
            html += `<tr class="${medalClass}"><td>${idx+1}</td><td class="expert-name">${exp.name}</td>
                     <td><strong>${exp.points}</strong></td>
                      <td>${exp.exact}</td>
                      <td>${exp.diff}</td>
                      <td>${exp.outcome}</td>
                    </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('expertsRankContainer').innerHTML = html;
    }

    function computeStandings(group) {
        const groupMatches = matchList.filter(m => m.group === group);
        const teams = [...new Set(groupMatches.flatMap(m => [m.home, m.away]))].filter(t => t);
        const stats = {};
        teams.forEach(t => stats[t] = { played:0, wins:0, draws:0, losses:0, gf:0, ga:0, pts:0 });
        groupMatches.forEach(m => {
            const s = scores[m.id];
            if (s && s.home !== undefined && s.away !== undefined) {
                const hg = s.home, ag = s.away;
                stats[m.home].gf += hg; stats[m.home].ga += ag;
                stats[m.away].gf += ag; stats[m.away].ga += hg;
                stats[m.home].played++; stats[m.away].played++;
                if (hg > ag) { stats[m.home].wins++; stats[m.home].pts += 3; stats[m.away].losses++; }
                else if (hg < ag) { stats[m.away].wins++; stats[m.away].pts += 3; stats[m.home].losses++; }
                else { stats[m.home].draws++; stats[m.away].draws++; stats[m.home].pts++; stats[m.away].pts++; }
            }
        });
        return teams.map(name => ({ name, ...stats[name] })).sort((a,b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf);
    }

    function renderStandings() {
        const active = document.querySelector('.filter-btn.active')?.getAttribute('data-group');
        if (!active || active === 'all') { document.getElementById('standingsContainer').innerHTML = ''; return; }
        const table = computeStandings(active);
        let html = `<h3><i class="fas fa-table"></i> Группа ${active} · Турнирная таблица</h3>
            <table><thead><tr><th>Команда</th><th>И</th><th>В</th><th>Н</th><th>П</th><th>З</th><th>П</th><th>О</th></tr></thead><tbody>`;
        table.forEach(t => {
            html += `<tr><td class="team-name">${t.name}</td>
                        <td>${t.played}</td>
                        <td>${t.wins}</td>
                        <td>${t.draws}</td>
                        <td>${t.losses}</td>
                        <td>${t.gf}</td>
                        <td>${t.ga}</td>
                        <td><strong>${t.pts}</strong></td>
                    </tr>`;
        });
        html += `</tbody></table></div>`;
        document.getElementById('standingsContainer').innerHTML = html;
    }

    function updateTeamColors() {
        const active = document.querySelector('.filter-btn.active')?.getAttribute('data-group') || 'all';
        let filtered = active === 'all' ? matchList : matchList.filter(m => m.group === active);
        filtered = filtered.filter(m => m.home);
        for (let m of filtered) {
            const s = scores[m.id];
            const homeDiv = document.querySelector(`.match-card[data-id='${m.id}'] .team:first-child`);
            const awayDiv = document.querySelector(`.match-card[data-id='${m.id}'] .team:last-child`);
            if (!homeDiv || !awayDiv) continue;
            homeDiv.classList.remove('win', 'loss', 'draw');
            awayDiv.classList.remove('win', 'loss', 'draw');
            if (s && s.home !== undefined && s.away !== undefined) {
                if (s.home > s.away) {
                    homeDiv.classList.add('win');
                    awayDiv.classList.add('loss');
                } else if (s.home < s.away) {
                    homeDiv.classList.add('loss');
                    awayDiv.classList.add('win');
                } else {
                    homeDiv.classList.add('draw');
                    awayDiv.classList.add('draw');
                }
            }
        }
    }

    function renderMatches() {
        const active = document.querySelector('.filter-btn.active')?.getAttribute('data-group') || 'all';
        let filtered = active === 'all' ? matchList : matchList.filter(m => m.group === active);
        filtered = filtered.filter(m => m.home);
        let html = '';
        for (let m of filtered) {
            const pred = m.pred ? m.pred : experts.map(() => '—');
            const s = scores[m.id];
            const homeVal = s?.home !== undefined ? s.home : '';
            const awayVal = s?.away !== undefined ? s.away : '';
            html += `
                <div class="match-card" data-id="${m.id}">
                    <div class="card-header">
                        <span class="group-badge">ГРУППА ${m.group}</span>
                        <span>${m.date} ${m.time}</span>
                    </div>
                    <div class="teams">
                        <div class="team"><i class="fas fa-shield-alt"></i> ${m.home}</div>
                        <div class="vs">VS</div>
                        <div class="team">${m.away} <i class="fas fa-shield-alt"></i></div>
                    </div>
                    <div class="score-inputs">
                        <input type="number" class="home-score" value="${homeVal}" placeholder="0" ${!isUnlocked ? 'disabled' : ''}>
                        <span>:</span>
                        <input type="number" class="away-score" value="${awayVal}" placeholder="0" ${!isUnlocked ? 'disabled' : ''}>
                    </div>
                    <div class="forecast-title">ПРОГНОЗЫ ЭКСПЕРТОВ</div>
                    <div class="experts-grid">
                        ${experts.map((exp, idx) => `<div class="expert-pred"><div>${exp}</div><div>${pred[idx]}</div></div>`).join('')}
                    </div>
                </div>
            `;
        }
        document.getElementById('matchesContainer').innerHTML = html;
        updateTeamColors();

        if (isUnlocked) {
            document.querySelectorAll('.match-card').forEach(card => {
                const id = parseInt(card.dataset.id);
                const homeInp = card.querySelector('.home-score');
                const awayInp = card.querySelector('.away-score');
                const update = () => {
                    const hv = homeInp.value === '' ? undefined : parseInt(homeInp.value);
                    const av = awayInp.value === '' ? undefined : parseInt(awayInp.value);
                    scores[id] = (hv !== undefined && av !== undefined && !isNaN(hv) && !isNaN(av)) ? { home: hv, away: av } : null;
                    renderExpertsRank();
                    renderStandings();
                    updateTeamColors();
                };
                homeInp.addEventListener('input', update);
                awayInp.addEventListener('input', update);
            });
        }
    }

    function buildFilters() {
        const groups = [...new Set(matchList.map(m => m.group))].filter(g => g);
        const container = document.getElementById('filterBar');
        container.innerHTML = `<button class="filter-btn active" data-group="all">🌍 Все группы</button>` +
            groups.map(g => `<button class="filter-btn" data-group="${g}">Группа ${g}</button>`).join('');
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderMatches();
                renderStandings();
            });
        });
    }

    function resetAll() {
        if (!isUnlocked) { alert("Редактирование заблокировано. Введите пароль."); return; }
        matchList.forEach(m => {
            scores[m.id] = (m.homeScore !== null && m.awayScore !== null) ? { home: m.homeScore, away: m.awayScore } : null;
        });
        saveScores();
        renderMatches();
        renderStandings();
        renderExpertsRank();
    }

    function unlock() {
        const pwd = prompt("Введите пароль:");
        if (pwd === EDIT_PASSWORD) {
            isUnlocked = true;
            document.getElementById('unlockBtn').innerHTML = '<i class="fas fa-check"></i> Режим активен';
            document.getElementById('lockStatus').innerHTML = '(разблокировано)';
            renderMatches();
        } else if (pwd) alert("Неверный пароль!");
    }

    document.getElementById('unlockBtn').addEventListener('click', unlock);
    document.getElementById('saveScoresBtn').addEventListener('click', () => { if(isUnlocked) saveScores(); else alert("Введите пароль!"); });
    document.getElementById('resetScoresBtn').addEventListener('click', resetAll);

    loadScores();
    buildFilters();
    renderExpertsRank();
    renderMatches();
    renderStandings();
</script>
</body>
</html>
