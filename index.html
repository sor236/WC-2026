        { id:67, group:"L", date:"17.06.2026", time:"23:00", home:"Англия", away:"Хорватия", pred:["2:1","2:2","3:1","1:1","1:1","1:1"] },
        { id:68, group:"L", date:"18.06.2026", time:"02:00", home:"Гана", away:"Панама", pred:["2:2","2:0","2:2","2:1","2:1","2:2"] },
        { id:69, group:"L", date:"24.06.2026", time:"02:00", home:"Панама", away:"Хорватия", pred:null },
        { id:70, group:"L", date:"28.06.2026", time:"00:00", home:"Панама", away:"Англия", pred:null },
        { id:71, group:"L", date:"28.06.2026", time:"00:00", home:"Хорватия", away:"Гана", pred:null },
        { id:72, group:"L", date:"23.06.2026", time:"23:00", home:"Англия", away:"Гана", pred:null }
    ];

    const experts = ["Антон", "Георгий", "Герман", "Олег", "Тимур", "Юрий"];
    let scores = {};

    function loadScoresFromLocalStorage() {
        const saved = localStorage.getItem("wc2026_scores");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                baseMatches.forEach(m => {
                    if (parsed[m.id] !== undefined) scores[m.id] = parsed[m.id];
                    else scores[m.id] = null;
                });
            } catch(e) { console.warn(e); }
        } else {
            baseMatches.forEach(m => { scores[m.id] = null; });
        }
    }

    function saveScoresToLocalStorage() {
        const toSave = {};
        for (let id in scores) {
            if (scores[id] !== null) toSave[id] = scores[id];
        }
        localStorage.setItem("wc2026_scores", JSON.stringify(toSave));
        // краткое уведомление
        const msg = document.createElement("div");
        msg.textContent = "✅ Счета сохранены!";
        msg.style.position = "fixed";
        msg.style.bottom = "70px";
        msg.style.left = "50%";
        msg.style.transform = "translateX(-50%)";
        msg.style.background = "#2dd4bf";
        msg.style.color = "#05100f";
        msg.style.padding = "0.3rem 1rem";
        msg.style.borderRadius = "40px";
        msg.style.fontSize = "0.8rem";
        msg.style.zIndex = "200";
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 2000);
    }

    function getPoints(predStr, realHome, realAway) {
        if (!predStr || predStr === "—") return 0;
        const [predHome, predAway] = predStr.split(':').map(Number);
        if (isNaN(predHome) || isNaN(predAway)) return 0;
        if (predHome === realHome && predAway === realAway) return 3;
        const realDiff = realHome - realAway;
        const predDiff = predHome - predAway;
        if (realDiff === predDiff) return 2;
        const realOutcome = (realHome > realAway) ? 1 : (realHome === realAway ? 0 : -1);
        const predOutcome = (predHome > predAway) ? 1 : (predHome === predAway ? 0 : -1);
        if (realOutcome === predOutcome) return 1;
        return 0;
    }

    function computeExpertsStats() {
        let stats = experts.map(name => ({ name, points: 0, exact: 0, diff: 0, outcome: 0 }));
        for (let match of baseMatches) {
            const score = scores[match.id];
            if (!score || score.home === undefined || score.away === undefined) continue;
            const realHome = score.home, realAway = score.away;
            if (!match.pred) continue;
            for (let i = 0; i < experts.length; i++) {
                const pts = getPoints(match.pred[i], realHome, realAway);
                if (pts === 3) { stats[i].points += 3; stats[i].exact += 1; }
                else if (pts === 2) { stats[i].points += 2; stats[i].diff += 1; }
                else if (pts === 1) { stats[i].points += 1; stats[i].outcome += 1; }
            }
        }
        stats.sort((a,b) => b.points - a.points || b.exact - a.exact || b.diff - a.diff);
        return stats;
    }

    function renderExpertsRank() {
        const container = document.getElementById("expertsRankContainer");
        const stats = computeExpertsStats();
        let html = `<h3><i class="fas fa-trophy"></i> 🏆 Рейтинг экспертов (3 — точный счёт, 2 — разница, 1 — исход)</h3>
            <table class="rank-table"><thead><tr><th>Место</th><th>Эксперт</th><th>Очки</th><th>Точных<br>счетов</th><th>Разниц<br>(2 очка)</th><th>Исходов<br>(1 очко)</th></tr></thead><tbody>`;
        stats.forEach((exp, idx) => {
            let medalClass = (idx === 0) ? "rank-1" : (idx === 1) ? "rank-2" : (idx === 2) ? "rank-3" : "";
            html += `<tr class="${medalClass}"><td>${idx+1}</td><td class="expert-name">${exp.name}</td>
                     <td><strong>${exp.points}</strong></td><td>${exp.exact}</td><td>${exp.diff}</td><td>${exp.outcome}</td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function computeStandings(group) {
        const groupMatches = baseMatches.filter(m => m.group === group);
        const teamsSet = new Set();
        groupMatches.forEach(m => { teamsSet.add(m.home); teamsSet.add(m.away); });
        let teams = Array.from(teamsSet).sort();
        const stats = {};
        teams.forEach(team => { stats[team] = { played:0, wins:0, draws:0, losses:0, gf:0, ga:0, points:0 }; });
        groupMatches.forEach(m => {
            const score = scores[m.id];
            if (score && score.home !== undefined && score.away !== undefined) {
                const hg = score.home, ag = score.away;
                const home = m.home, away = m.away;
                stats[home].gf += hg; stats[home].ga += ag;
                stats[away].gf += ag; stats[away].ga += hg;
                stats[home].played++; stats[away].played++;
                if (hg > ag) { stats[home].wins++; stats[home].points += 3; stats[away].losses++; }
                else if (hg < ag) { stats[away].wins++; stats[away].points += 3; stats[home].losses++; }
                else { stats[home].draws++; stats[away].draws++; stats[home].points += 1; stats[away].points += 1; }
            }
        });
        let table = teams.map(team => ({ name:team, ...stats[team] }));
        table.sort((a,b) => b.points - a.points || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf);
        return table;
    }

    function renderStandings(group) {
        const container = document.getElementById("standingsContainer");
        if (group === "all") { container.innerHTML = ''; return; }
        const standings = computeStandings(group);
        if (!standings.length) return;
        let html = `<div class="standings"><h3><i class="fas fa-table"></i> Группа ${group} · Турнирная таблица</h3>
            <table><thead><tr><th>Команда</th><th>И</th><th>В</th><th>Н</th><th>П</th><th>З</th><th>П</th><th>О</th></tr></thead><tbody>`;
        standings.forEach(t => {
            html += `<tr><td class="team-name">${t.name}</td><td>${t.played}</td><td>${t.wins}</td><td>${t.draws}</td><td>${t.losses}</td><td>${t.gf}</td><td>${t.ga}</td><td>${t.points}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function renderMatches(group) {
        const container = document.getElementById("matchesContainer");
        let filtered = group === "all" ? baseMatches : baseMatches.filter(m => m.group === group);
        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem;">Нет матчей в этой группе</div>`;
            return;
        }
        let html = "";
        for (let match of filtered) {
            let predictions = match.pred ? match.pred : experts.map(() => "—");
            while (predictions.length < 6) predictions.push("—");
            const currentScore = scores[match.id];
            const homeVal = (currentScore && currentScore.home !== undefined) ? currentScore.home : '';
            const awayVal = (currentScore && currentScore.away !== undefined) ? currentScore.away : '';
            html += `
                <div class="match-card" data-match-id="${match.id}">
                    <div class="card-header">
                        <span class="group-badge"><i class="fas fa-users"></i> ГРУППА ${match.group}</span>
                        <div class="datetime"><i class="far fa-calendar-alt"></i> ${match.date} ${match.time}</div>
                    </div>
                    <div class="teams">
                        <div class="team"><i class="fas fa-shield-alt"></i> ${match.home}</div>
                        <div class="vs">VS</div>
                        <div class="team">${match.away} <i class="fas fa-shield-alt"></i></div>
                    </div>
                    <div class="score-inputs">
                        <input type="number" class="home-score" placeholder="0" value="${homeVal}" step="1" min="0" ${!isUnlocked ? 'disabled' : ''}>
                        <span style="font-weight:bold">:</span>
                        <input type="number" class="away-score" placeholder="0" value="${awayVal}" step="1" min="0" ${!isUnlocked ? 'disabled' : ''}>
                    </div>
                    <div class="forecast-title"><i class="fas fa-chart-simple"></i> ПРОГНОЗЫ ЭКСПЕРТОВ</div>
                    <div class="experts-grid">
                        ${experts.map((exp, idx) => `<div class="expert-pred"><div class="expert-name">${exp}</div><div class="expert-score">${predictions[idx]}</div></div>`).join('')}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        if (isUnlocked) {
            const cards = document.querySelectorAll('.match-card');
            cards.forEach(card => {
                const id = parseInt(card.getAttribute('data-match-id'));
                const homeInput = card.querySelector('.home-score');
                const awayInput = card.querySelector('.away-score');
                const update = () => {
                    const hv = homeInput.value === '' ? undefined : parseInt(homeInput.value);
                    const av = awayInput.value === '' ? undefined : parseInt(awayInput.value);
                    if (hv !== undefined && av !== undefined && !isNaN(hv) && !isNaN(av)) {
                        scores[id] = { home: hv, away: av };
                    } else {
                        scores[id] = null;
                    }
                    renderExpertsRank();
                    const activeGroup = document.querySelector('.filter-btn.active').getAttribute('data-group');
                    if (activeGroup !== 'all') renderStandings(activeGroup);
                    else document.getElementById("standingsContainer").innerHTML = '';
                };
                homeInput.addEventListener('input', update);
                awayInput.addEventListener('input', update);
            });
        }
    }

    function resetAllScores() {
        if (!isUnlocked) {
            alert("Редактирование заблокировано. Введите пароль.");
            return;
        }
        baseMatches.forEach(m => { scores[m.id] = null; });
        saveScoresToLocalStorage();
        const activeGroup = document.querySelector('.filter-btn.active').getAttribute('data-group');
        renderMatches(activeGroup);
        renderExpertsRank();
        if (activeGroup !== 'all') renderStandings(activeGroup);
        else document.getElementById("standingsContainer").innerHTML = '';
    }

    function refresh(group) {
        renderMatches(group);
        renderExpertsRank();
        if (group !== 'all') renderStandings(group);
        else document.getElementById("standingsContainer").innerHTML = '';
    }

    // --- Пароль (нижняя панель) ---
    function unlockEditor() {
        const pwd = prompt("Введите пароль для редактирования счетов:");
        if (pwd === EDIT_PASSWORD) {
            isUnlocked = true;
            const unlockBtn = document.getElementById("unlockBtn");
            const statusSpan = document.getElementById("lockStatus");
            unlockBtn.innerHTML = '<i class="fas fa-check"></i> Режим активен';
            unlockBtn.classList.add("disabled");
            unlockBtn.disabled = true;
            statusSpan.innerHTML = "(разблокировано)";
            statusSpan.style.color = "#2dd4bf";
            const activeGroup = document.querySelector('.filter-btn.active').getAttribute('data-group');
            refresh(activeGroup === "all" ? "all" : activeGroup);
        } else if (pwd !== null) {
            alert("Неверный пароль! Доступ запрещён.");
        }
    }

    // --- Сохранение и сброс через нижние кнопки ---
    document.getElementById("saveScoresBtn").addEventListener("click", () => {
        if (!isUnlocked) {
            alert("Редактирование заблокировано. Сначала введите пароль.");
            return;
        }
        saveScoresToLocalStorage();
    });
    document.getElementById("resetScoresBtn").addEventListener("click", resetAllScores);
    document.getElementById("unlockBtn").addEventListener("click", unlockEditor);

    // Фильтры групп
    const btns = document.querySelectorAll(".filter-btn");
    function setActive(grp) {
        btns.forEach(btn => {
            if (btn.getAttribute("data-group") === grp) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }
    btns.forEach(btn => {
        btn.addEventListener("click", () => {
            const grp = btn.getAttribute("data-group");
            setActive(grp);
            refresh(grp === "all" ? "all" : grp);
        });
    });

    // Старт
    loadScoresFromLocalStorage();
    refresh("all");
</script>
</body>
</html>
