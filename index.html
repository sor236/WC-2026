    // Построение турнирной таблицы (все очки = 0, т.к. матчи не сыграны)
    function buildStandings(group) {
        const groupMatches = matchesData.filter(m => m.group === group);
        const teamsSet = new Set();
        groupMatches.forEach(m => { teamsSet.add(m.home); teamsSet.add(m.away); });
        let teams = Array.from(teamsSet).sort();
        const stats = {};
        teams.forEach(team => {
            stats[team] = { played:0, wins:0, draws:0, losses:0, gf:0, ga:0, points:0 };
        });
        // Все матчи имеют счёт TBD, поэтому никаких очков не начисляем
        let table = teams.map(team => ({ name:team, ...stats[team] }));
        table.sort((a,b) => b.points - a.points);
        return table;
    }

        let html = `<div class="standings"><h3><i class="fas fa-table"></i> Группа ${group} · Турнирная таблица (матчи не сыграны)</h3>
            <table><thead><tr><th>Команда</th><th>И</th><th>В</th><th>Н</th><th>П</th><th>З</th><th>П</th><th>О</th></tr></thead><tbody>`;
        standings.forEach(t => {
            html += `<tr><td class="team-name">${t.name}</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function renderMatches(group) {
        const container = document.getElementById("matchesContainer");
        let filtered = group === "all" ? matchesData : matchesData.filter(m => m.group === group);
        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem;">Нет матчей в этой группе</div>`;
            return;
        }
        let html = "";
        for (let match of filtered) {
            let predictions = match.pred ? match.pred : experts.map(() => "—");
            while (predictions.length < 6) predictions.push("—");
            html += `
                <div class="match-card">
                    <div class="card-header">
                        <span class="group-badge"><i class="fas fa-users"></i> ГРУППА ${match.group}</span>
                        <div class="datetime"><i class="far fa-calendar-alt"></i> ${match.date} ${match.time}</div>
                    </div>
                    <div class="teams">
                        <div class="team"><i class="fas fa-shield-alt"></i> ${match.home}</div>
                        <div class="vs">VS</div>
                        <div class="team">${match.away} <i class="fas fa-shield-alt"></i></div>
                    </div>
                    <div class="score-section">
                        <div class="real-score"><i class="fas fa-trophy"></i> СЧЕТ: <span>TBD</span></div>
                    </div>
                    <div class="forecast-title"><i class="fas fa-chart-simple"></i> ПРОГНОЗЫ ЭКСПЕРТОВ</div>
                    <div class="experts-grid">
                        ${experts.map((exp, idx) => `<div class="expert-pred"><div class="expert-name">${exp}</div><div class="expert-score">${predictions[idx]}</div></div>`).join('')}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function refresh(group) {
        renderStandings(group);
        renderMatches(group);
    }

    const btns = document.querySelectorAll(".filter-btn");
    function setActive(grp) {
        btns.forEach(btn => {
            if (btn.getAttribute("data-group") === grp) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }
    btns.forEach(btn => {
        btn.addEventListener("click", () => {
            const grp = btn.getAttribute("data-group");
            setActive(grp);
            refresh(grp === "all" ? "all" : grp);
        });
    });
    refresh("all");
</script>
</body>
</html>
